doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # Hostinger MySQL / MariaDB: set DATABASE_SERVER_VERSION on Render (e.g. 8.0.36 or mariadb-10.11.2).
        # Falls back to MySQL 8.0 when unset (see services.yaml parameter doctrine.default_server_version).
        server_version: '%env(default:doctrine.default_server_version:DATABASE_SERVER_VERSION)%'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
        options:
            # PDO::MYSQL_ATTR_INIT_COMMAND - force UTC session timezone per connection.
            1002: "SET time_zone = '+00:00'"

        # Exclude internal/legacy tables from schema diff
        schema_filter: '~^(?!doctrine_migration_versions$|messenger_messages$|user$)~'
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@dev:
    doctrine:
        dbal:
            logging: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
