# see https://symfony.com/doc/current/reference/configuration/framework.html
parameters:
    # Canonical application timezone (pair with php.ini date.timezone=UTC).
    app.timezone: 'UTC'

framework:
    secret: '%env(APP_SECRET)%'
    annotations: false
    http_method_override: false
    handle_all_throwables: true
    csrf_protection: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax

    #esi: true
    #fragments: true
    php_errors:
        log: true

when@test:
    framework:
        test: true
        # Re-enable session for tests (mock storage); main app uses JWT only.
        session:
            enabled: true
            storage_factory_id: session.storage.factory.mock_file

when@prod:
    framework:
        # Render terminates TLS; trust forwarded scheme/host from their edge.
        trusted_proxies: '127.0.0.1,REMOTE_ADDR'
        trusted_headers:
            - x-forwarded-for
            - x-forwarded-proto
            - x-forwarded-port
            - x-forwarded-host
