lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600
    # Use email so JwtCookieAuthenticator's loadUserByIdentifier() finds the user (provider uses property: email)
    user_id_claim: email
    user_identity_field: email
    token_extractors:
        authorization_header:
            enabled: true
        cookie:
            enabled: false
